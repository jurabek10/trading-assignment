services:
  - type: web
    name: trading-assignment
    runtime: docker
    plan: free
    repo: https://github.com/jurabek10/trading-assignment
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: USE_LS
        value: 0
